<!DOCTYPE html> 
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300…0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>weatherforecast-sibanyoni</title>

</head>     
<body>
    <div class="weather-app">
    <header>
        <form class="search-form" id="search-form">
            <input type="search" placeholder="Enter a city.." required id="search-form-input" class="search-form-input">
             <input type="submit" value="Search" class="search-form-button">
        </form> 
    </header>
    <main>
        <div class="weather-app-data">
        <div>
        <h1 class="weather-app-city" id="city"> </h1>
        <p class="weather-app-details"><span id="time"></span>, <span id="description"></span>
            <br/>
        Humidity: <strong id="humidity"></strong>, Wind: <strong id="wind-speed"></strong>
        </p>
        </div>
            <div class="weather-app-temperature-container">
            <div class="weather-app-icon">⛅️</div>
            <div class="weather-app-temperature" id="temperature"></div>
            <div class="weather-app-unit">°C</div>
        </div>
        </div>

    </main>

    <footer>
          This project was coded by <a href="https://github.com/Londiso" target="_blank">Sindi Sibanyoni</a> 
          hosted on <a href="https://github.com/Londiso/WeatherForecast" target="_blank">GitHub</a> 
          website hosted on <a href="https://weatherforecast-sibanyoni.netlify.app/" target="_blank">Netlify</a>

    </footer>
    </div>
    <script src="src/index.js"></script>  
</body>
</html>
